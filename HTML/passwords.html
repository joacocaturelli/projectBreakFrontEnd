<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Generador de contraseñas seguras y aleatorias" />
        <link rel="stylesheet" href="../CSS/reset.css" />
        <link rel="stylesheet" href="../CSS/styles.css" />
        <title>Generador de Contraseñas</title>
    </head>
    <body>
        <header id="main-header"></header>
        <nav class="nav-container">
            <a href="./clock.html" class="btn-nav">RELOJ</a>
            <a href="./passwords.html" class="btn-nav">GENERADOR DE CONTRASEÑAS</a>
            <a href="./links.html" class="btn-nav">ENLACES DE INTERES</a>
            <a href="./weather.html" class="btn-nav">APLICACIÓN DEL CLIMA</a>
        </nav>
        
        <div class="password-container">
            <div id="password-generator" class="card">
                <h1 class="password-card-h1">Generador de Contraseñas</h1>
                <label for="lengthPassword">Longitud de la contraseña:</label>
                <div class="password-inputs">
                    <input type="number" id="lengthPassword" name="length" min="12" max="50" value="12">
                    <button id="btn-generatePassword">Generar Contraseña</button>
                </div>
                <div id="password-generated-container" class="hide">
                    <h2>Contraseña generada:</h2>
                    <span id="resultPassword"></span>
                </div>
            </div>
        </div>
        <script type="module" src="../JS/main.js"></script>
    </body>
</html>
