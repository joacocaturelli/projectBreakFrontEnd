<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Gestor de enlaces de interés con almacenamiento local" />
        <link rel="stylesheet" href="../CSS/reset.css" />
        <link rel="stylesheet" href="../CSS/styles.css" />
        <title>Almacén de links</title>
    </head>
    <body>
        <header id="main-header"></header>
        <nav class="nav-container">
            <a href="./clock.html" class="btn-nav">RELOJ</a>

        <div class="links-container">
            <div id="links-generator" class="card">
                <h1 class="links-card-h1">Añade tu enlace de interés</h1>
                <input type="text" id="links-name" value="" placeholder="Nombre de tu enlace" required>
                <input type="url" id="url-links" value="" placeholder="Pega aqui tu URL" required>
                <button id="btn-generate-link">Añadir enlace</button>
            </div>
            <div class="links-generated-container-padding hide">
                <div id="links-generated-container" class="hide"></div>
            </div>
        </div>
        <script type="module" src="../JS/main.js"></script>
